apiVersion: v1
kind: ServiceAccount
metadata:
  name: learnkube-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: learnkube-operator
rules:
  # The custom resource this operator reconciles.
  - apiGroups: ["learnkube.dev"]
    resources: ["learnkubeapps"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["learnkube.dev"]
    resources: ["learnkubeapps/status"]
    verbs: ["get", "patch"]
  # The built-in objects the operator creates/updates/deletes to actually
  # implement each LearnKubeApp.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kopf emits Kubernetes Events for observability (visible via `kubectl
  # describe learnkubeapp`); this is what lets it do that.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Beyond learnkubeapps itself, kopf also opportunistically watches the
  # CRD object that defines it, so it can notice a schema change (e.g. a
  # new field added to crd.yaml) without needing the operator restarted.
  # Without this rule, kopf logs "Not enough permissions to watch for
  # resources" at startup and falls back to only picking up CRD changes on
  # its own next restart -- degraded, not broken: reconciling actual
  # LearnKubeApp objects is unaffected either way, since that RBAC is
  # already granted above.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: learnkube-operator
subjects:
  - kind: ServiceAccount
    name: learnkube-operator
    namespace: default
roleRef:
  kind: ClusterRole
  name: learnkube-operator
  apiGroup: rbac.authorization.k8s.io
