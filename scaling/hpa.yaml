apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: learnkube-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: learnkube-hpa
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up once average CPU usage across all replicas exceeds
          # 50% of each pod's *request* (100m from hpa-deployment.yaml) --
          # i.e. above 50m per pod.
          averageUtilization: 50
